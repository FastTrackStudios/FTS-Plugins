[package]
name = "rider-analysis"
version.workspace = true
authors.workspace = true
license.workspace = true
edition.workspace = true
description = "Offline vocal rider analysis — reads audio via AudioAccessor and writes volume automation to DAW envelopes"

[dependencies]
rider-dsp = { path = "../rider-dsp" }
fts-dsp = { path = "../../fts-dsp" }
daw = { workspace = true, optional = true }
daw-control-sync = { workspace = true, optional = true }

[features]
default = []
daw = ["dep:daw", "dep:daw-control-sync"]
