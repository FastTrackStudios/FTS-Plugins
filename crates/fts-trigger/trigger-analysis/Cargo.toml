[package]
name = "trigger-analysis"
version.workspace = true
authors.workspace = true
license.workspace = true
edition.workspace = true
description = "Offline trigger analysis — reads audio via AudioAccessor and writes trigger/MIDI automation to the DAW"

[dependencies]
trigger-dsp = { path = "../trigger-dsp" }
fts-dsp = { path = "../../fts-dsp" }
daw = { workspace = true, optional = true }
daw-control-sync = { workspace = true, optional = true }

[features]
default = []
daw = ["dep:daw", "dep:daw-control-sync"]
